<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Two</title>
    <style>

        :root {
      --primary: #007acc;
      --primary-gradient: linear-gradient(135deg, #007acc 0%, #00b4db 100%);
      --bg: var(--vscode-editor-background);
      --card-bg: var(--vscode-sideBar-background);
      --text-main: var(--vscode-editor-foreground);
      --text-muted: var(--vscode-descriptionForeground);
      --border: rgba(128, 128, 128, 0.1);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }


     body {
      font-family: "Segoe UI Variable Text", "Segoe UI", sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      margin: 0;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      }
      .container {
      max-width: 800px;
      width: 100%;
    }

    .nav-header {
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-back {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      background: transparent;
      border: none;
      font-size: 1rem;
    }

    .btn-back:hover { opacity: 0.8; }

    .lesson-badge {
      background: rgba(0, 122, 204, 0.1);
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .lesson-card {
      background: var(--card-bg);
      padding: 3rem;
      border-radius: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      text-align: center;
    }

    .icon-placeholder {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      display: inline-block;
    }

    h1 {
      margin-top: 0;
      font-size: 2.2rem;
      color: var(--primary);
      letter-spacing: -1px;
    }

    .status-msg {
      color: var(--text-muted);
      font-size: 1.1rem;
      max-width: 500px;
      margin: 1.5rem auto 2.5rem;
    }

    .content-blueprint {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 2rem;
      background: rgba(128, 128, 128, 0.03);
    }

    .loading-dots::after {
      content: ' .';
      animation: dots 1.5s steps(5, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: ' .'; }
      40% { content: ' . .'; }
      60% { content: ' . . .'; }
      80%, 100% { content: ''; }
    }

    .btn-home {
      background: var(--primary-gradient);
      color: white;
      padding: 12px 30px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
      margin-top: 2rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 122, 204, 0.3);
    }

  </style>
</head>
<body>

<div class="container">
  <div class="nav-header">
    <button class="btn-back" id="goHomeBtn">← Back</button>
    <span class="lesson-badge">Module 2</span>
  </div>

  <div class="lesson-card">
    <div class="icon-placeholder">🚧</div>
    <h1>Lesson Two: Coming Soon</h1>
    <p class="status-msg">
      We are currently crafting the next stage of your coding journey. 
      This lesson will cover advanced editor features and your first project structure.
    </p>

    <div class="content-blueprint">
      <p style="margin:0; font-weight: 600; opacity: 0.6;">
        Content Under Development<span class="loading-dots"></span>
      </p>
    </div>

    <a href="#" class="btn-home" id="returnBtn">Return to Dashboard</a>
  </div>
</div>

<script>
  const vscode = acquireVsCodeApi();

  const goHome = () => {
    vscode.postMessage({ 
      command: 'go_Home', 
      action: 'openWalkthrough' 
    });
  };

  document.getElementById('goHomeBtn').addEventListener('click', goHome);
  document.getElementById('returnBtn').addEventListener('click', (e) => {
    e.preventDefault();
    goHome();
  });
</script>
</body>
</html>
